<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presentation Page</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f4f7fa;
      color: #333;
    }

    /* Header */
    header {
      background: #0d6efd;
      padding: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    header div {
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
    }

    .nav-btn {
      background: white;
      border: none;
      padding: 12px 22px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
      font-weight: bold;
    }

    .nav-btn a {
      text-decoration: none;
      color: #0d6efd;
      font-size: 15px;
    }

    .nav-btn:hover {
      background: #dbe9ff;
      transform: translateY(-2px);
    }

    /* Main Section */
    .presentations {
      width: 90%;
      max-width: 1000px;
      margin: 40px auto;
      text-align: center;
    }

    .presentations h1 {
      margin-bottom: 25px;
      color: #0d6efd;
      font-size: 32px;
    }

    video {
      width: 100%;
      max-width: 850px;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
      margin-bottom: 30px;
      background: black;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .nav-btn {
        width: 100%;
      }

      .presentations h1 {
        font-size: 24px;
      }
    }
  </style>
</head>

<body>

  <header>
    <div>
      <button class="nav-btn">
        <a href="index.html">Home</a>
      </button>

      <button class="nav-btn">
        <a href="about us.html">About Us</a>
      </button>

      <button class="nav-btn">
        <a href="contact us.html">Contact Us</a>
      </button>

      <button class="nav-btn">
        <a href="images.html">See Photos</a>
      </button>
    </div>
  </header>

  <div class="presentations">
    <h1>Our Presentations</h1>

    <video src="video1.mp4" controls></video>

    <video src="our work.mp4" controls></video>
  </div>

</body>
</html>
